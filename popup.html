<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Grasp</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Night Countdown</p>
        <h1>Time Grasp</h1>
        <p class="subtitle">Set your bedtime and routine so the extension can track your real usable time.</p>
      </header>

      <form id="settings-form" class="settings-form">
        <label class="field">
          <span>Bedtime</span>
          <input id="bedtime" name="bedtime" type="time" required>
        </label>

        <label class="field">
          <span>Routine name</span>
          <input
            id="routine-label"
            name="routineLabel"
            type="text"
            maxlength="40"
            placeholder="Shower, brush teeth, get ready"
          >
        </label>

        <section class="field">
          <div class="section-heading">
            <span>Routine actions</span>
            <button id="add-action-button" class="ghost-button" type="button">Add action</button>
          </div>
          <div id="routine-actions" class="actions-list"></div>
          <p id="routine-total" class="routine-total">Total routine time: 0 min</p>
        </section>

        <fieldset class="field checkbox-group">
          <legend>Notifications</legend>
          <label class="checkbox">
            <input id="notify-30" name="notify30" type="checkbox">
            <span>30 minutes left</span>
          </label>
          <label class="checkbox">
            <input id="notify-5" name="notify5" type="checkbox">
            <span>5 minutes left</span>
          </label>
          <label class="checkbox">
            <input id="notify-0" name="notify0" type="checkbox">
            <span>Time is up</span>
          </label>
        </fieldset>

        <button id="save-button" class="save-button" type="submit">Save settings</button>
      </form>

      <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
      <div id="save-toast" class="save-toast" aria-hidden="true">Settings saved</div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
